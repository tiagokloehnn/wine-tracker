<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E0A12"/>
      <stop offset="100%" stop-color="#0A0306"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3D1525" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8364E"/>
      <stop offset="100%" stop-color="#701020"/>
    </linearGradient>
    <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0E2CC" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#F0E2CC" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#F0E2CC" stop-opacity="0.22"/>
    </linearGradient>
    <clipPath id="bowlClip">
      <path d="M 168 98 L 344 98 C 390 185, 308 316, 266 322 L 246 322 C 204 316, 122 185, 168 98 Z"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Warm center glow -->
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- Wine fill clipped to bowl shape -->
  <rect x="80" y="222" width="352" height="220" fill="url(#wine)" clip-path="url(#bowlClip)"/>

  <!-- Glass body semi-transparent fill -->
  <path d="M 168 98 L 344 98 C 390 185, 308 316, 266 322 L 246 322 C 204 316, 122 185, 168 98 Z"
        fill="url(#glassShine)"/>

  <!-- Glass bowl outline -->
  <path d="M 168 98 L 344 98 C 390 185, 308 316, 266 322 L 246 322 C 204 316, 122 185, 168 98 Z"
        fill="none" stroke="#F0E2CC" stroke-width="9" stroke-linejoin="round"/>

  <!-- Stem -->
  <rect x="250" y="322" width="12" height="80" fill="#F0E2CC" rx="4"/>

  <!-- Base -->
  <rect x="196" y="402" width="120" height="13" fill="#F0E2CC" rx="6"/>

  <!-- Left shine highlight on glass -->
  <path d="M 190 128 C 184 178, 182 228, 188 268"
        stroke="white" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.38"/>

  <!-- Tiny rim highlight -->
  <path d="M 178 98 L 216 98"
        stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

  <!-- Wine surface shine -->
  <path d="M 200 228 Q 256 218, 312 228"
        stroke="white" stroke-width="3" fill="none"
        stroke-linecap="round" opacity="0.25"/>
</svg>
